<!DOCTYPE html>
<html>
<head>
<style>

.box{
  width:300px;

  background-color: lightblue;

  padding:20px;

  border:5px solid black;

  margin:50px;
}

</style>
</head>

<body>

<div class="box">
This is the content area of the box model.
Padding gives space inside the border.
Border surrounds the padding.
Margin creates space outside the border.
</div>

</body>
</html>
