<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
</head>

<body>

    <h2>HTML Table Demonstration</h2>

    <!-- Table Starts Here -->
    <table border="2" cellspacing="5" cellpadding="10">

        <!-- Row 1: Table Heading -->
        <tr>
            <th>Student ID</th>
            <th>Student Name</th>
            <th colspan="2">Marks</th>
        </tr>

        <!-- Row 2: Subheadings for Marks -->
        <tr>
            <th></th>
            <th></th>
            <th>Math</th>
            <th>Science</th>
        </tr>

        <!-- Row 3: Normal Row -->
        <tr>
            <td>101</td>
            <td>Rahul</td>
            <td>85</td>
            <td>90</td>
        </tr>

        <!-- Row 4: Rowspan Example -->
        <tr>
            <td rowspan="2">102</td>
            <td rowspan="2">Vijay</td>
            <td>88</td>
            <td>92</td>
        </tr>

        <!-- Row 5: Second row of Rowspan -->
        <tr>
            <td>91</td>
            <td>89</td>
        </tr>

        <!-- Row 6: Colspan Example -->
        <tr>
            <td>103</td>
            <td>Suresh</td>
            <td colspan="2" align="center">Absent</td>
        </tr>

    </table>

</body>
</html>
