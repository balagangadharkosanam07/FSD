<!DOCTYPE html>
<html>
<head>
<style>
.colorName{
  color: red;
}

.hexColor{
  color: #00FF00;
}

.rgbColor{
  color: rgb(0,0,255);
}

.rgbaColor{
  color: rgba(255,0,0,0.5);
}

.hslColor{
  color: hsl(240,100%,50%);
}
</style>
</head>

<body>

<h2 class="colorName">Color using Name</h2>

<h2 class="hexColor">Color using HEX value</h2>

<h2 class="rgbColor">Color using RGB value</h2>

<h2 class="rgbaColor">Color using RGBA value</h2>

<h2 class="hslColor">Color using HSL value</h2>

</body>
</html>
