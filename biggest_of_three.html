<!DOCTYPE html>
<html>
<head>
<title>Largest Number</title>
<script>
function findLargest()
{
    var a = parseInt(prompt("Enter first number"));
    var b = parseInt(prompt("Enter second number"));
    var c = parseInt(prompt("Enter third number"));

    if(a==b && b==c)
    {
        alert("EQUAL NUMBERS");
        document.write("EQUAL NUMBERS");
    }
    else
    {
        var largest = a;

        if(b > largest)
        largest = b;

        if(c > largest)
        largest = c;

        alert(largest + " LARGER NUMBER");
        document.write(largest + " LARGER NUMBER");
    }
}
</script>
</head>

<body onload="findLargest()">
</body>
</html>
