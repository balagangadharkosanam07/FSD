<!DOCTYPE html>
<html>
<head>
<title>Object Loop Example</title>
<script>

function showObject()
{
const student = {
name:"Ravi",
age:20,
course:"B.Tech"
};

document.write("<h3>Using for-in</h3>");
for(let key in student)
{
document.write(key+" : "+student[key]+"<br>");
}

document.write("<h3>Using forEach</h3>");
Object.entries(student).forEach(function([key,value]){
document.write(key+" : "+value+"<br>");
});

document.write("<h3>Using for-of</h3>");
for(let [key,value] of Object.entries(student))
{
document.write(key+" : "+value+"<br>");
}

}

</script>
</head>

<body onload="showObject()">
</body>
</html>
